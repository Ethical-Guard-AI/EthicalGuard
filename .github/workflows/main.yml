name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # Triggers the workflow whenever you push a version tag like v1.0.0
  workflow_dispatch:
jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    
    # 1. Matches the "Environment name" field from your image
    environment:
      name: release
      url: https://pypi.org/p/EthicalGuard # Optional: links to your PyPI project page

    # 2. CRITICAL: This permission is required for Trusted Publishing / OIDC to work
    permissions:
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.x'

    - name: Install dependencies and build package
      run: |
        python -m pip install --upgrade pip build
        python -m build

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
